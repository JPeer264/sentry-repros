<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inner Page (iframe) - Sentry Feedback Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    .info {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Inner Page (Inside iframe)</h1>
  <div class="info">
    <p>This page is loaded inside an iframe.</p>
    <p>Click the Sentry Feedback button in the bottom-right corner, then try to take a screenshot.</p>
    <p><strong>Expected:</strong> Screenshot capture should fail with a permission error because the iframe doesn't have the <code>display-capture</code> permission.</p>
  </div>

  <script type="module" src="./sentry.js"></script>
</body>
</html>
